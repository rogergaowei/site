<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roger Gao Wei</title>
    <meta name="description" content="Roger Gao Wei's personal home page, with links to his blog and game.">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">Roger Gao Wei</a>
      <nav aria-label="Primary">
        <a href="/blog/">Blog</a>
        <a href="/game/">Game</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Home</p>
          <h1>Stories, games, and projects by Roger.</h1>
        </div>
        <div class="visual" aria-hidden="true">
          <div class="orbit orbit-one"></div>
          <div class="orbit orbit-two"></div>
          <div class="tile tile-blog">Blog</div>
          <div class="tile tile-game">Game</div>
        </div>
      </section>

      <section class="links" aria-label="Roger's sites">
        <article class="link-card">
          <a href="/blog/">
            <span>Read</span>
            <h2>Blog</h2>
            <p>Trip notes, memories, and things Roger is learning.</p>
          </a>
        </article>

        <article class="link-card">
          <a href="/game/">
            <span>Play</span>
            <h2>Retro Corner Catch</h2>
            <p>A small browser game with fast movement and arcade scoring.</p>
          </a>
        </article>
      </section>
    </main>
  </body>
</html>
