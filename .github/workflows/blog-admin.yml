name: Blog Admin

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Action to run"
        required: true
        type: choice
        options:
          - add-doc
          - rebuild-index
        default: rebuild-index
      google_doc_url:
        description: "Google Doc URL. Required for add-doc."
        required: false
        type: string
      title:
        description: "Post title. Required for add-doc."
        required: false
        type: string
      slug:
        description: "Optional URL slug. Leave blank to derive from title."
        required: false
        type: string
      sort_date:
        description: "Post date in YYYY-MM-DD."
        required: false
        type: string
      summary:
        description: "Short blog index summary."
        required: false
        type: string
      status:
        description: "Post status"
        required: true
        type: choice
        options:
          - draft
          - published
        default: draft

permissions:
  contents: write

jobs:
  blog-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run blog admin task
        run: |
          node scripts/admin-blog.mjs \
            --operation "${{ inputs.operation }}" \
            --url "${{ inputs.google_doc_url }}" \
            --title "${{ inputs.title }}" \
            --slug "${{ inputs.slug }}" \
            --sort-date "${{ inputs.sort_date }}" \
            --summary "${{ inputs.summary }}" \
            --status "${{ inputs.status }}"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/content/google-docs.json blog/content/posts.json blog/index.html blog/posts
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Run blog admin task"
            git push
          fi
